<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>体重管理</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: sans-serif; padding: 15px; }
input, button {
  width: 100%;
  margin: 5px 0;
  padding: 12px;
  font-size: 16px;
}
button { background: #4CAF50; color: white; border: none; }
</style>
</head>

<body>

<h2>体重・体脂肪</h2>

<input type="text" id="name" placeholder="名前">
<input type="date" id="date">
<input type="number" id="weight" placeholder="体重(kg)">
<input type="number" id="fat" placeholder="体脂肪(%)">

<button onclick="saveData()">記録する</button>

<ul id="list"></ul>
<canvas id="chart"></canvas>

<script>
  let chart;
  
const API_URL = "https://script.google.com/macros/s/AKfycbz0QUGG4hF9yP6slO7fNRX8KWLGRjsf7ujpactvJv0JkauZP9bEdslVdCLNtX1QwLvA/exec";

let data = [];

const now = new Date();
now.setHours(now.getHours() + 9);
document.getElementById("date").value = now.toISOString().split("T")[0];

async function saveData() {
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const weight = document.getElementById("weight").value;
  const fat = document.getElementById("fat").value;

  if (!name || !weight || !fat) {
    alert("入力してください");
    return;
  }

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ name, date, weight, fat })
  });

  document.getElementById("weight").value = "";
  document.getElementById("fat").value = "";

  loadData();
}

async function loadData() {
  const res = await fetch(API_URL);
  const rows = await res.json();

  data = rows.slice(1).map(r => ({
    name: r[0],
    date: new Date(r[1]).toLocaleDateString("ja-JP"),
    weight: r[2],
    fat: r[3]
  }));

  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const currentUser = document.getElementById("name").value;

data
  .filter(d => d.name === currentUser)
  .forEach(d => {
    const li = document.createElement("li");
    li.textContent = `${d.date} ${d.weight}kg / ${d.fat}%`;
    list.appendChild(li);
  });

  drawChart();
}

function drawChart() {
  const ctx = document.getElementById("chart");

  const currentUser = document.getElementById("name").value;
if (!currentUser) return;

const filtered = data.filter(d => d.name === currentUser);

  if (chart) {
  chart.destroy();
}
  
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: filtered.map(d => d.date),
datasets: [
  { label: '体重', data: filtered.map(d => d.weight) },
  { label: '体脂肪', data: filtered.map(d => d.fat) }
]

      
    }
  });
}

// 初回読み込み
loadData();
</script>

</body>
</html>
